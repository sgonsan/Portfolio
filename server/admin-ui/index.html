<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>elbiti admin</title>
  <link rel="icon" type="image/svg+xml" href="/assets/icon.svg">
  <link rel="stylesheet" href="/admin/admin.css">
</head>
<body>
  <div id="login-view" hidden>
    <form id="login-form" class="login-box">
      <h1>// elbiti admin</h1>
      <label for="lg-user">$ user</label>
      <input id="lg-user" name="username" autocomplete="username" required>
      <label for="lg-pass">$ password</label>
      <input id="lg-pass" name="password" type="password" autocomplete="current-password" required>
      <button type="submit">login</button>
      <p id="login-error" class="error" role="alert"></p>
    </form>
  </div>

  <div id="app-view" hidden>
    <header class="topbar">
      <span class="logo">// elbiti admin</span>
      <nav id="tabs">
        <a href="#/dashboard">[dashboard]</a>
        <a href="#/content">[content]</a>
        <a href="#/sections">[sections]</a>
        <a href="#/contacts">[contacts]</a>
        <a href="#/accounts">[accounts]</a>
        <a href="#/site">[site]</a>
      </nav>
      <span id="who"></span>
      <button id="logout">logout</button>
    </header>
    <main id="view"></main>
  </div>

  <script src="/admin/admin.js?v=7" type="module"></script>
</body>
</html>
